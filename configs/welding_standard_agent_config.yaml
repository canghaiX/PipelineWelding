agent:
  name: welding_standard_agent
  role: 管道焊接标准制定智能体
  input_source: welding_reask_agent_json
  output_format: json

reference:
  wps_docx_path: data/MHPWPS-062.docx
  max_reference_chars: 4000
  max_reference_query_chars: 1000

llm:
  enabled: true
  model_config_path: configs/model_config.yaml
  prompt_path: prompts/welding_standard_agent_prompt.md
  max_evidence_chars: 9000
  max_sources_per_query: 3

mcp_search:
  enabled: true
  transport: streamable_http
  tool_name: tavily_search
  command: ""
  args: []
  url: https://mcp.tavily.com/mcp/?tavilyApiKey=${TAVILY_API_KEY}
  max_results: 5
